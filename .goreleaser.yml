version: 2

project_name: nullcloud-backend

before:
  hooks:
    - go mod tidy

builds:
  - id: nullcloud-backend
    main: .
    binary: nullcloud-backend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "nullcloud-backend_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto

brews:
  - name: nullcloud-backend
    repository:
      owner: we-work-in-the-cloud
      name: backend-nullcloud
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: HomebrewFormula
    homepage: https://github.com/we-work-in-the-cloud/backend-nullcloud
    description: NullCloud backend server
    install: |
      bin.install "nullcloud-backend"
    test: |
      assert_match "port", shell_output("#{bin}/nullcloud-backend --help 2>&1", 2)
